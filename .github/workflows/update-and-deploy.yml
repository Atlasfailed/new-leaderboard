name: Update Data and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: "35 10 * * 2,6"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pipeline dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate static JSON data
        run: python -m pipeline.run --output site/data --refresh

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=bar-leaderboard --branch=${{ github.ref_name }}
